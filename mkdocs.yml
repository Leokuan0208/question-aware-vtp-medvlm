theme:
  name: material
  language: en

  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

  font:
    text: IBM Plex Sans
    code: JetBrains Mono

  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.indexes        # section headers (e.g. "Week 1") are clickable pages
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.suggest
    - content.code.copy           # one-click copy button on every code block
    - content.code.annotate
    - content.action.edit
    - toc.follow

  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  # ---------------------------------------------------------------------------
  # Code-block highlighting and presentation.
  #   auto_title         -> shows the language name (e.g. "Bash", "Python")
  #                         in a labelled bar at the top-left of every block.
  #   anchor_linenums    -> line numbers can be linked to.
  #   pygments_lang_class-> emits `language-xxx` CSS class for theming.
  # ---------------------------------------------------------------------------
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
      auto_title: true
      use_pygments: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - javascripts/mathjax.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
  
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Leokuan0208
      name: GitHub
  generator: false
